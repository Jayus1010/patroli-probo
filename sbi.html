<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Si Patrol - Unit SBI</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/html5-qrcode" type="text/javascript"></script>
  <style>
    #loading { display: none; transition: opacity 0.3s ease; }
    .is-loading #loading { display: flex; }
    ::-webkit-scrollbar { width: 6px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
  </style>
</head>
<body class="bg-slate-50 min-h-screen text-slate-800 font-sans flex items-center justify-center sm:p-4">
    
    <div id="app" class="w-full max-w-md mx-auto bg-white min-h-screen sm:min-h-[800px] sm:rounded-[2.5rem] sm:shadow-[0_20px_50px_-12px_rgba(0,0,0,0.1)] relative overflow-x-hidden flex flex-col border-0 sm:border-8 border-slate-100">
        
        <div id="loading" class="absolute inset-0 bg-white/80 backdrop-blur-sm z-50 flex-col justify-center items-center">
            <div class="relative w-16 h-16">
                <div class="absolute inset-0 rounded-full border-4 border-emerald-100"></div>
                <div class="absolute inset-0 rounded-full border-4 border-emerald-600 border-t-transparent animate-spin"></div>
            </div>
            <p class="text-emerald-800 font-bold tracking-wide mt-4 animate-pulse" id="loading-text">Memproses...</p>
        </div>

        <header class="bg-gradient-to-br from-emerald-700 to-green-600 text-white pt-12 pb-10 px-6 text-center rounded-b-[3rem] shadow-lg relative z-10">
            <div class="absolute top-0 left-0 w-full h-full overflow-hidden rounded-b-[3rem] z-0 opacity-20">
                <div class="absolute -top-10 -right-10 w-40 h-40 bg-white rounded-full blur-3xl"></div>
                <div class="absolute bottom-0 -left-10 w-32 h-32 bg-emerald-400 rounded-full blur-2xl"></div>
            </div>
            
            <div class="relative z-10 flex flex-col items-center">
                <div class="mb-4 transform hover:scale-105 transition-transform duration-300">
                    <img src="https://i.postimg.cc/kXxQshGC/Japfa-Food-Logo.png" 
                         alt="Logo Japfa" 
                         class="w-32 h-auto object-contain drop-shadow-2xl">
                </div>
                
                <h1 class="text-4xl font-extrabold tracking-tight drop-shadow-md mb-1">Si Patrol</h1>
                <div class="w-12 h-1 bg-orange-400 rounded-full my-2"></div>
                <p class="text-xs text-emerald-100 font-bold tracking-[0.2em] uppercase opacity-90">
                    Unit SBI - Security System
                </p>
            </div>
        </header>

        <div id="login-view" class="p-6 mt-2 flex-grow flex flex-col z-0">
            <div class="text-center mb-8 mt-4">
                <h2 class="text-xl font-bold text-slate-800">Selamat Datang di SBI,</h2>
                <p class="text-sm text-slate-500 mt-1">Silahkan masuk untuk mulai patroli.</p>
            </div>

            <div class="space-y-5">
                <div>
                    <label class="block text-xs font-bold text-slate-500 uppercase tracking-wider mb-2 ml-1">NIK / Username</label>
                    <input type="text" id="username" class="w-full bg-slate-50 border border-slate-200 text-slate-800 rounded-2xl p-4 text-sm outline-none focus:bg-white focus:border-orange-500 transition-all" placeholder="Masukkan NIK">
                </div>
                <div>
                    <label class="block text-xs font-bold text-slate-500 uppercase tracking-wider mb-2 ml-1">PIN Keamanan</label>
                    <input type="password" id="pin" class="w-full bg-slate-50 border border-slate-200 text-slate-800 rounded-2xl p-4 text-sm outline-none focus:bg-white focus:border-orange-500 transition-all" placeholder="••••••••">
                </div>
                
                <div class="pt-4">
                    <button onclick="doLogin()" class="w-full bg-gradient-to-r from-orange-500 to-orange-600 text-white font-bold py-4 px-4 rounded-2xl shadow-lg shadow-orange-500/30 active:scale-[0.98] transition-all">
                        Masuk Bertugas
                    </button>
                </div>
            </div>
        </div>

        <div id="dashboard-view" class="p-6 hidden flex-col flex-grow">
            <div class="bg-white border border-slate-100 rounded-3xl p-5 mb-6 shadow-sm flex items-center gap-4 relative overflow-hidden">
                <div class="w-14 h-14 rounded-2xl bg-emerald-100 text-emerald-600 flex items-center justify-center flex-shrink-0">
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-7 w-7" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M19 21v-2a4 4 0 0 0-4-4H9a4 4 0 0 0-4 4v2"></path><circle cx="12" cy="7" r="4"></circle></svg>
                </div>
                <div>
                    <p class="text-[10px] font-bold text-slate-400 uppercase tracking-wider">Petugas SBI</p>
                    <p class="text-lg font-extrabold text-slate-800" id="user-name-display">Nama Anggota</p>
                </div>
            </div>

            <div id="gps-status" class="mb-8 p-4 rounded-2xl text-sm text-center font-semibold bg-orange-50 text-orange-600 border border-orange-100 flex items-center justify-center gap-2 transition-all">
                Mencari Titik Koordinat...
            </div>

            <div class="flex-grow flex flex-col justify-center">
                <button id="btn-scan" onclick="startScanner()" class="w-full bg-slate-900 text-white font-bold py-5 px-4 rounded-3xl shadow-xl opacity-50 cursor-not-allowed" disabled>
                    <span class="tracking-wide">Scan Barcode Lokasi</span>
                </button>
            </div>

            <div id="reader-container" class="hidden relative bg-slate-900 rounded-3xl overflow-hidden mb-6">
                <div id="reader" class="w-full"></div>
                <button onclick="stopScanner()" class="absolute bottom-5 left-1/2 transform -translate-x-1/2 bg-white/20 backdrop-blur-md text-white font-bold py-2 px-6 rounded-full border border-white/20 z-20">
                    Batal
                </button>
            </div>

            <button onclick="doLogout()" class="w-full bg-slate-100 text-slate-500 font-bold py-4 rounded-2xl mt-4">
                Logout
            </button>
        </div>
    </div>

    <script>
        const GAS_API_URL = 'https://script.google.com/macros/s/AKfycbwE4e-jkX-BtANcRsUQjKzmHx3_PyRauygC2bFLKtkp8lmvFmMBpSskihkXIue70jo/exec'; 

        let currentUser = null;
        let currentLat = null;
        let currentLng = null;
        let html5QrcodeScanner = null;

        function showLoading(text) {
            document.getElementById('loading-text').innerText = text;
            document.getElementById('app').classList.add('is-loading');
        }

        function hideLoading() {
            document.getElementById('app').classList.remove('is-loading');
        }

        // FUNGSI FETCH YANG SUDAH DIPERBAIKI
        async function fetchAPI(payload) {
            try {
                const response = await fetch(GAS_API_URL, {
                    method: 'POST',
                    headers: { 'Content-Type': 'text/plain;charset=utf-8' },
                    body: JSON.stringify(payload)
                });
                return await response.json();
            } catch (error) {
                console.error("Fetch Error:", error);
                return { success: false, message: 'Koneksi Gagal.' };
            }
        }

        async function doLogin() {
            const user = document.getElementById('username').value;
            const pin = document.getElementById('pin').value;
            if(!user || !pin) return alert('Isi NIK dan PIN!');

            showLoading('Memverifikasi...');
            const result = await fetchAPI({ action: 'login', username: user, pin: pin });
            hideLoading();

            if (result.success) {
                currentUser = { username: user, nama: result.nama };
                document.getElementById('login-view').classList.add('hidden');
                document.getElementById('dashboard-view').classList.remove('hidden');
                document.getElementById('user-name-display').innerText = result.nama;
                initGPS();
            } else {
                alert('Gagal: ' + result.message);
            }
        }

        function initGPS() {
            const gpsStatus = document.getElementById('gps-status');
            const btnScan = document.getElementById('btn-scan');
            if (navigator.geolocation) {
                navigator.geolocation.watchPosition((position) => {
                    currentLat = position.coords.latitude;
                    currentLng = position.coords.longitude;
                    gpsStatus.innerHTML = `✅ Lokasi Terkunci (${Math.round(position.coords.accuracy)}m)`;
                    gpsStatus.className = 'mb-8 p-4 rounded-2xl text-sm text-center font-semibold bg-emerald-50 text-emerald-700 border border-emerald-100 flex items-center justify-center gap-2';
                    btnScan.disabled = false;
                    btnScan.classList.remove('opacity-50', 'cursor-not-allowed');
                }, (error) => {
                    gpsStatus.innerText = 'GPS Error!';
                }, { enableHighAccuracy: true });
            }
        }

        function startScanner() {
            document.getElementById('reader-container').classList.remove('hidden');
            document.getElementById('btn-scan').classList.add('hidden');
            html5QrcodeScanner = new Html5Qrcode("reader");
            html5QrcodeScanner.start({ facingMode: "environment" }, { fps: 10, qrbox: 250 }, onScanSuccess);
        }

        function stopScanner() {
            if(html5QrcodeScanner) {
                html5QrcodeScanner.stop().then(() => {
                    document.getElementById('reader-container').classList.add('hidden');
                    document.getElementById('btn-scan').classList.remove('hidden');
                });
            }
        }

        async function onScanSuccess(decodedText) {
            stopScanner();
            showLoading('Mengunci Lokasi...');
            
            navigator.geolocation.getCurrentPosition(async (position) => {
                const freshLat = position.coords.latitude;
                const freshLng = position.coords.longitude;
                const urlGoogleMaps = `https://www.google.com/maps?q=${freshLat},${freshLng}`;

                // PAYLOAD KHUSUS UNIT SBI
                const payload = {
                    action: 'submitPatrol',
                    unitTarget: 'sbi', // <--- KUNCI KE SHEET SBI
                    data: {
                        username: currentUser.username,
                        nama: currentUser.nama,
                        qrCode: decodedText,
                        lat: freshLat,
                        lng: freshLng,
                        mapsUrl: urlGoogleMaps
                    }
                };

                showLoading('Mengirim Laporan...');
                const result = await fetchAPI(payload);
                hideLoading();
                
                if (result.success) {
                    alert('BERHASIL!\n' + result.message);
                } else {
                    alert('ERROR: ' + result.message);
                }
            }, (err) => {
                hideLoading();
                alert('Gagal dapat lokasi presisi.');
            }, { enableHighAccuracy: true, timeout: 10000 });
        }

        function doLogout() {
            location.reload();
        }
    </script>
</body>
</html>
