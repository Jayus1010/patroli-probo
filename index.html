<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Si Patrol - Security</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/html5-qrcode" type="text/javascript"></script>
  <style>
    #loading { display: none; transition: opacity 0.3s ease; }
    .is-loading #loading { display: flex; }
    
    /* Custom Scrollbar for a cleaner look */
    ::-webkit-scrollbar { width: 6px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
    ::-webkit-scrollbar-thumb:hover { background: #94a3b8; }
  </style>
</head>
<body class="bg-slate-50 min-h-screen text-slate-800 font-sans flex items-center justify-center sm:p-4">
    
    <!-- App Container (Mobile App Frame Simulator) -->
    <div id="app" class="w-full max-w-md mx-auto bg-white min-h-screen sm:min-h-[800px] sm:rounded-[2.5rem] sm:shadow-[0_20px_50px_-12px_rgba(0,0,0,0.1)] relative overflow-x-hidden flex flex-col border-0 sm:border-8 border-slate-100">
        
        <!-- Loading Overlay (Frosted Glass) -->
        <div id="loading" class="absolute inset-0 bg-white/80 backdrop-blur-sm z-50 flex-col justify-center items-center">
            <div class="relative w-16 h-16">
                <div class="absolute inset-0 rounded-full border-4 border-indigo-100"></div>
                <div class="absolute inset-0 rounded-full border-4 border-indigo-600 border-t-transparent animate-spin"></div>
            </div>
            <p class="text-indigo-800 font-bold tracking-wide mt-4 animate-pulse" id="loading-text">Memproses...</p>
        </div>

        <!-- Header -->
        <header class="bg-gradient-to-br from-indigo-700 to-blue-600 text-white pt-10 pb-8 px-6 text-center rounded-b-3xl shadow-lg relative z-10">
            <div class="absolute top-0 left-0 w-full h-full overflow-hidden rounded-b-3xl z-0 opacity-20">
                <div class="absolute -top-10 -right-10 w-40 h-40 bg-white rounded-full blur-3xl"></div>
                <div class="absolute bottom-0 -left-10 w-32 h-32 bg-blue-300 rounded-full blur-2xl"></div>
            </div>
            <div class="relative z-10">
                <h1 class="text-3xl font-extrabold tracking-tight">Si Patrol</h1>
                <p class="text-sm text-indigo-100 mt-1 font-medium tracking-wide">Sistem Patroli Security Bekri</p>
            </div>
        </header>

        <!-- HALAMAN LOGIN -->
        <div id="login-view" class="p-6 mt-2 flex-grow flex flex-col z-0">
            <div class="text-center mb-8 mt-4">
                <h2 class="text-xl font-bold text-slate-800">Selamat Datang,</h2>
                <p class="text-sm text-slate-500 mt-1">Silakan masuk untuk mulai bertugas.</p>
            </div>

            <div class="space-y-5">
                <div>
                    <label class="block text-xs font-bold text-slate-500 uppercase tracking-wider mb-2 ml-1">NIK / Username</label>
                    <input type="text" id="username" class="w-full bg-slate-50 border border-slate-200 text-slate-800 rounded-2xl p-4 text-sm outline-none focus:bg-white focus:border-indigo-500 focus:ring-4 focus:ring-indigo-500/10 transition-all duration-300" placeholder="Masukkan NIK Anda">
                </div>
                <div>
                    <label class="block text-xs font-bold text-slate-500 uppercase tracking-wider mb-2 ml-1">PIN Keamanan</label>
                    <input type="password" id="pin" class="w-full bg-slate-50 border border-slate-200 text-slate-800 rounded-2xl p-4 text-sm outline-none focus:bg-white focus:border-indigo-500 focus:ring-4 focus:ring-indigo-500/10 transition-all duration-300" placeholder="••••••••">
                </div>
                
                <div class="pt-4">
                    <button onclick="doLogin()" class="w-full bg-gradient-to-r from-indigo-600 to-blue-600 text-white font-bold py-4 px-4 rounded-2xl shadow-lg shadow-indigo-500/30 hover:shadow-indigo-500/50 hover:-translate-y-0.5 active:translate-y-0 active:scale-[0.98] transition-all duration-200">
                        Masuk Bertugas
                    </button>
                </div>
            </div>
            
            <!-- Watermark -->
            <div class="mt-auto pt-8 pb-2 text-center">
                <p class="text-[10px] text-slate-400 font-semibold uppercase tracking-[0.2em]">Created by Bang Jay &copy; 2026</p>
            </div>
        </div>

        <!-- HALAMAN DASHBOARD / SCANNER -->
        <div id="dashboard-view" class="p-6 hidden flex-col flex-grow">
            
            <!-- User Card Modern -->
            <div class="bg-white border border-slate-100 rounded-3xl p-5 mb-6 shadow-sm flex items-center gap-4 relative overflow-hidden">
                <div class="absolute top-0 right-0 w-20 h-20 bg-indigo-50 rounded-bl-full -z-0"></div>
                <div class="w-14 h-14 rounded-2xl bg-indigo-100 text-indigo-600 flex items-center justify-center flex-shrink-0 z-10">
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-7 w-7" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M19 21v-2a4 4 0 0 0-4-4H9a4 4 0 0 0-4 4v2"></path><circle cx="12" cy="7" r="4"></circle></svg>
                </div>
                <div class="z-10">
                    <p class="text-[10px] font-bold text-slate-400 uppercase tracking-wider mb-0.5">Petugas Jaga</p>
                    <p class="text-lg font-extrabold text-slate-800 leading-tight" id="user-name-display">Nama Anggota</p>
                </div>
            </div>

            <!-- GPS Status Modern Badge -->
            <div id="gps-status" class="mb-8 p-4 rounded-2xl text-sm text-center font-semibold bg-amber-50 text-amber-600 border border-amber-100 flex items-center justify-center gap-2 transition-colors duration-300">
                <svg class="animate-spin h-4 w-4 text-amber-500" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24"><circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle><path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path></svg>
                Mencari Titik Koordinat...
            </div>

            <!-- Tombol Live Camera -->
            <div class="flex-grow flex flex-col justify-center">
                <button id="btn-scan" onclick="startScanner()" class="w-full bg-slate-900 text-white font-bold py-5 px-4 rounded-3xl shadow-xl shadow-slate-900/20 hover:bg-slate-800 hover:-translate-y-1 active:translate-y-0 active:scale-[0.98] transition-all duration-300 flex flex-col items-center justify-center gap-3 opacity-50 cursor-not-allowed" disabled>
                    <div class="bg-white/20 p-3 rounded-2xl backdrop-blur-sm">
                        <svg xmlns="http://www.w3.org/2000/svg" class="h-8 w-8 text-white" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
                            <path stroke-linecap="round" stroke-linejoin="round" d="M12 4v1m6 11h2m-6 0h-2v4m0-11v3m0 0h.01M12 12h4.01M16 20h4M4 12h4m12 0h.01M5 8h2a1 1 0 001-1V5a1 1 0 00-1-1H5a1 1 0 00-1 1v2a1 1 0 001 1zm14 0h2a1 1 0 001-1V5a1 1 0 00-1-1h-2a1 1 0 00-1 1v2a1 1 0 001 1zM5 20h2a1 1 0 001-1v-2a1 1 0 00-1-1H5a1 1 0 00-1 1v2a1 1 0 001 1z" />
                        </svg>
                    </div>
                    <span class="tracking-wide">Scan Barcode Lokasi</span>
                </button>
            </div>

            <!-- Area Tampilan Kamera Scanner -->
            <div id="reader-container" class="hidden relative bg-slate-900 rounded-3xl overflow-hidden shadow-2xl ring-4 ring-slate-900/10 mb-6">
                <div id="reader" class="w-full"></div>
                <div class="absolute inset-0 pointer-events-none border-[6px] border-indigo-500/30 rounded-3xl z-10"></div>
                <button onclick="stopScanner()" class="absolute bottom-5 left-1/2 transform -translate-x-1/2 bg-white/10 backdrop-blur-md text-white font-bold py-3 px-8 rounded-full border border-white/20 shadow-lg hover:bg-white/20 transition-all z-20">
                    Batalkan
                </button>
            </div>

            <div class="mt-8">
                <button onclick="doLogout()" class="w-full bg-slate-100 text-slate-500 font-bold py-4 px-4 rounded-2xl hover:bg-slate-200 hover:text-slate-700 active:scale-[0.98] transition-all duration-200">
                    Selesai Bertugas (Logout)
                </button>
            </div>
        </div>
    </div>

    <!-- JAVASCRIPT LOGIC -->
    <script>
        // ==========================================
        // KONFIGURASI API BACKEND
        // ==========================================
        const GAS_API_URL = 'https://script.google.com/macros/s/AKfycbyGe7o_GmnIBydrE8u0h0zG0C3NdavzpaHlW_Mr1_5wkZAadts8h63N_fhzhknUgP4/exec'; 

        let currentUser = null;
        let currentLat = null;
        let currentLng = null;
        let html5QrcodeScanner = null;

        function showLoading(text) {
            document.getElementById('loading-text').innerText = text;
            document.getElementById('app').classList.add('is-loading');
        }

        function hideLoading() {
            document.getElementById('app').classList.remove('is-loading');
        }

        async function fetchAPI(action, payloadData = {}) {
            try {
                const response = await fetch(GAS_API_URL, {
                    method: 'POST',
                    headers: { 'Content-Type': 'text/plain;charset=utf-8' },
                    body: JSON.stringify({ action: action, ...payloadData })
                });
                return await response.json();
            } catch (error) {
                console.error("Fetch Error:", error);
                return { success: false, message: 'Gagal terhubung ke server. Periksa koneksi internet.' };
            }
        }

        async function doLogin() {
            const user = document.getElementById('username').value;
            const pin = document.getElementById('pin').value;

            if(!user || !pin) return alert('Silakan isi NIK dan PIN terlebih dahulu.');

            showLoading('Memverifikasi...');
            
            const result = await fetchAPI('login', { username: user, pin: pin });
            
            hideLoading();

            if (result.success) {
                currentUser = { username: user, nama: result.nama };
                
                // Smooth transition to dashboard
                document.getElementById('login-view').classList.add('hidden');
                document.getElementById('dashboard-view').classList.remove('hidden');
                document.getElementById('dashboard-view').classList.add('animate-[fadeIn_0.5s_ease-in-out]');
                
                document.getElementById('user-name-display').innerText = result.nama;
                initGPS();
            } else {
                alert('❌ GAGAL: ' + result.message);
            }
        }

        function doLogout() {
            if(html5QrcodeScanner) stopScanner();
            currentUser = null;
            document.getElementById('username').value = '';
            document.getElementById('pin').value = '';
            
            document.getElementById('dashboard-view').classList.add('hidden');
            document.getElementById('login-view').classList.remove('hidden');
            document.getElementById('login-view').classList.add('animate-[fadeIn_0.5s_ease-in-out]');
        }

        function initGPS() {
            const gpsStatus = document.getElementById('gps-status');
            const btnScan = document.getElementById('btn-scan');

            if (navigator.geolocation) {
                navigator.geolocation.watchPosition(
                    (position) => {
                        currentLat = position.coords.latitude;
                        currentLng = position.coords.longitude;
                        
                        gpsStatus.innerHTML = `<svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5 text-emerald-500" viewBox="0 0 20 20" fill="currentColor"><path fill-rule="evenodd" d="M5.05 4.05a7 7 0 119.9 9.9L10 18.9l-4.95-4.95a7 7 0 010-9.9zM10 11a2 2 0 100-4 2 2 0 000 4z" clip-rule="evenodd" /></svg> Lokasi Terkunci (Akurasi: ${Math.round(position.coords.accuracy)}m)`;
                        gpsStatus.className = 'mb-8 p-4 rounded-2xl text-sm text-center font-semibold bg-emerald-50 text-emerald-700 border border-emerald-100 flex items-center justify-center gap-2 shadow-sm transition-all duration-300';
                        
                        btnScan.disabled = false;
                        btnScan.classList.remove('opacity-50', 'cursor-not-allowed');
                    },
                    (error) => {
                        gpsStatus.innerHTML = `<svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5 text-rose-500" viewBox="0 0 20 20" fill="currentColor"><path fill-rule="evenodd" d="M10 18a8 8 0 100-16 8 8 0 000 16zM8.707 7.293a1 1 0 00-1.414 1.414L8.586 10l-1.293 1.293a1 1 0 101.414 1.414L10 11.414l1.293 1.293a1 1 0 001.414-1.414L11.414 10l1.293-1.293a1 1 0 00-1.414-1.414L10 8.586 8.707 7.293z" clip-rule="evenodd" /></svg> Izin GPS Browser Ditolak!`;
                        gpsStatus.className = 'mb-8 p-4 rounded-2xl text-sm text-center font-semibold bg-rose-50 text-rose-700 border border-rose-100 flex items-center justify-center gap-2 shadow-sm transition-all duration-300';
                        
                        btnScan.disabled = true;
                        btnScan.classList.add('opacity-50', 'cursor-not-allowed');
                    },
                    { enableHighAccuracy: true, maximumAge: 0, timeout: 10000 }
                );
            } else {
                gpsStatus.innerText = 'Browser/HP Anda tidak mendukung pelacakan GPS.';
            }
        }

        function startScanner() {
            if(!currentLat || !currentLng) return alert('Lokasi (GPS) belum terkunci!');

            document.getElementById('reader-container').classList.remove('hidden');
            document.getElementById('btn-scan').classList.add('hidden');

            html5QrcodeScanner = new Html5Qrcode("reader");
            
            html5QrcodeScanner.start(
                { facingMode: "environment" }, 
                { fps: 10, qrbox: { width: 250, height: 250 } },
                onScanSuccess,
                (errorMessage) => { /* abaikan error fokus */ }
            ).catch(err => {
                alert("Gagal membuka kamera. Pastikan browser memberikan izin kamera.");
                stopScanner();
            });
        }

        function stopScanner() {
            if(html5QrcodeScanner) {
                html5QrcodeScanner.stop().then(() => {
                    document.getElementById('reader-container').classList.add('hidden');
                    document.getElementById('btn-scan').classList.remove('hidden');
                }).catch(err => console.error("Stop scanner error", err));
            } else {
                document.getElementById('reader-container').classList.add('hidden');
                document.getElementById('btn-scan').classList.remove('hidden');
            }
        }

        async function onScanSuccess(decodedText, decodedResult) {
            stopScanner();
            showLoading('Menyimpan Data Patroli...');

            const urlGoogleMaps = `https://www.google.com/maps?q=${currentLat},${currentLng}`;

            const payload = {
                data: {
                    username: currentUser.username,
                    nama: currentUser.nama,
                    qrCode: decodedText, 
                    lat: currentLat,    
                    lng: currentLng,
                    mapsUrl: urlGoogleMaps
                }
            };

            const result = await fetchAPI('submitPatrol', payload);
            
            hideLoading();
            if (result.success) {
                // Gunakan alert browser bawaan atau bisa di-upgrade pakai modal custom
                alert('✅ ' + result.message);
            } else {
                alert('❌ GAGAL: ' + result.message);
            }
        }
        
        // Tailwind Custom Animations Injector
        tailwind.config = {
            theme: {
                extend: {
                    keyframes: {
                        fadeIn: {
                            '0%': { opacity: '0', transform: 'translateY(10px)' },
                            '100%': { opacity: '1', transform: 'translateY(0)' },
                        }
                    }
                }
            }
        }
    </script>
</body>
</html>
